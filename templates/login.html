<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Case y Más</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .brand { color: #e94560; font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .subtitle { color: #888; text-align: center; font-size: 0.9rem; margin-bottom: 30px; }
    .btn-login { background: #e94560; border: none; width: 100%; padding: 12px; font-weight: 600; }
    .btn-login:hover { background: #c73652; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">📱 Case y Más</div>
    <div class="subtitle">Sistema de gestión</div>
    {% if form.errors %}
      <div class="alert alert-danger py-2 small">Usuario o contraseña incorrectos.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Contraseña</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-4 d-flex align-items-center gap-2">
        <input type="checkbox" name="remember_me" id="remember_me" class="form-check-input" style="width:18px;height:18px;">
        <label for="remember_me" class="form-check-label small text-muted" style="cursor:pointer;">
          Recordar sesión por 30 días
        </label>
      </div>
      <button type="submit" class="btn btn-login text-white">Ingresar</button>
    </form>
  </div>
</body>
</html>
